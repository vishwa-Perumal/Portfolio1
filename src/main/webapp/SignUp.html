<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>

    <h2>User Sign Up</h2>

    <form action="/ProjectDemo2/signup" method="post">
        
        <label for="username">Username:</label><br>
        <input type="text" id="uname" name="uname" required><br><br>

        <label for="password">Password:</label><br>

        <button type="submit">Sign Up</button>

    </form>

</body>
</html>
